<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pool Casino</title>
<link rel="stylesheet" href="style/main.css">
<link rel="stylesheet" href="style/dashboard.css">
<link rel="stylesheet" href="style/roulette.css">
</head>
<body>
<div class="navbar">
  <div class="logo">POOL CASINO</div>
  <div class="menu">
    <button class="nav-btn" data-view="dashboard">
      <img src="assets/icons/dashboard.svg" class="icon"> Dashboard
    </button>
    <button class="nav-btn" data-view="games">
      <img src="assets/icons/games.svg" class="icon"> Games
    </button>
    <button class="nav-btn" data-view="leaderboard">
      <img src="assets/icons/leaderboard.svg" class="icon"> Leaderboard
    </button>
    <button class="nav-btn" data-view="profile">
      <img src="assets/icons/profile.svg" class="icon"> Profile
    </button>
  </div>
  <div class="account">
    <div class="pfp"></div>
    <button id="loginBtn" class="nav-btn">Log In</button>
    <button id="signupBtn" class="nav-btn">Sign Up</button>
  </div>
</div>

<div id="views">
  <!-- DASHBOARD -->
  <div id="dashboard" class="view">
    <h1>Dashboard</h1>
    <div class="dashboard-cards">
      <div class="card">Global Pool: $0</div>
      <div class="card">Featured Games</div>
      <div class="card">Recent Wins</div>
      <div class="card">Biggest Bet & Win</div>
    </div>
  </div>

  <!-- GAMES -->
  <div id="games" class="view hidden">
    <h1>Games</h1>
    <div class="roulette-wrapper">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
      <div class="arrow">▲</div>
      <div class="controls-panel">
        <div class="balance">Balance: $<span id="balance">1000</span></div>
        <div class="bet-buttons">
          <button class="bet-btn red" data-color="red">Red</button>
          <button class="bet-btn black" data-color="black">Black</button>
          <button class="bet-btn green" data-color="green">Green</button>
        </div>
        <input type="number" id="betAmount" placeholder="Bet Amount" class="pop-input">
        <button id="spinBtn" class="pop-btn">Spin</button>
        <div class="result">Result: <span id="result">-</span></div>
        <div class="message" id="message"></div>
      </div>
    </div>
  </div>

  <div id="leaderboard" class="view hidden">
    <h1>Leaderboard</h1>
    <p>Placeholder content</p>
  </div>

  <div id="profile" class="view hidden">
    <h1>Profile</h1>
    <p>Placeholder content</p>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/roulette.js"></script>
</body>
</html>
